name: Deploy audit demo (Pages)

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/audit/**'
      - 'packages/sdk/wasm/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage WASM engine (copy engine.wasm + wasm_exec.js)
        run: bash apps/audit/build.sh
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/audit
      - id: deployment
        uses: actions/deploy-pages@v4
