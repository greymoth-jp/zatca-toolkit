name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  go-core:
    name: Go core (go test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: packages/core/go.sum
      - name: go test ./...
        working-directory: packages/core
        run: go test ./...

  sdk:
    name: TypeScript SDK (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: node --test
        working-directory: packages/sdk
        run: node --test
