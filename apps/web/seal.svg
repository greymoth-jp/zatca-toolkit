<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round">
  <!-- Official clearance seal: a girih khatim (8-fold star) inside a guilloche ring.
       Geometry from the public-domain "polygons in contact" / rub-el-hizb construction;
       drawn as precise engraving lines (currentColor so it tints ink / red / green). -->
  <circle cx="100" cy="100" r="96"/>
  <circle cx="100" cy="100" r="90"/>
  <!-- 16 engraving rays -->
  <g stroke-width="0.8">
    <line x1="100" y1="10" x2="100" y2="26"/><line x1="163.6" y1="36.4" x2="152.3" y2="47.7"/>
    <line x1="190" y1="100" x2="174" y2="100"/><line x1="163.6" y1="163.6" x2="152.3" y2="152.3"/>
    <line x1="100" y1="190" x2="100" y2="174"/><line x1="36.4" y1="163.6" x2="47.7" y2="152.3"/>
    <line x1="10" y1="100" x2="26" y2="100"/><line x1="36.4" y1="36.4" x2="47.7" y2="47.7"/>
    <line x1="140" y1="14.7" x2="135.6" y2="25.4"/><line x1="185.3" y1="60" x2="174.6" y2="64.4"/>
    <line x1="185.3" y1="140" x2="174.6" y2="135.6"/><line x1="140" y1="185.3" x2="135.6" y2="174.6"/>
    <line x1="60" y1="185.3" x2="64.4" y2="174.6"/><line x1="14.7" y1="140" x2="25.4" y2="135.6"/>
    <line x1="14.7" y1="60" x2="25.4" y2="64.4"/><line x1="60" y1="14.7" x2="64.4" y2="25.4"/>
  </g>
  <!-- 8-point star = two overlapping squares (khatim) -->
  <polygon points="100,22 178,100 100,178 22,100"/>
  <polygon points="155,45 155,155 45,155 45,45"/>
  <!-- inner rosette -->
  <polygon points="100,52 148,100 100,148 52,100"/>
  <polygon points="134,66 134,134 66,134 66,66"/>
  <circle cx="100" cy="100" r="20"/>
  <circle cx="100" cy="100" r="3.2" fill="currentColor"/>
</svg>
